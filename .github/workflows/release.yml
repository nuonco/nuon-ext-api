name: Release

# the intention here is to always have a release (automated)
# but this workflow can be triggered from a workflow in nuonco/nuon

on:
  workflow_dispatch:
  schedule:
    # Check daily at 06:00 UTC for a new API version
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get API version
        id: version
        run: |
          API_VERSION=$(curl -sS https://api.nuon.co/version | jq -r '.version')
          echo "api_version=$API_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$API_VERSION" >> "$GITHUB_OUTPUT"
          echo "API version: $API_VERSION"

      - name: Check if release already exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG does not exist, proceeding."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if tag already exists
        id: tag
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist yet."
          fi

      - name: Inspect tag/spec state
        id: state
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          EXPECTED="${{ steps.version.outputs.api_version }}"

          if [ "${{ steps.tag.outputs.exists }}" = 'true' ]; then
            TAGGED_SPEC_VERSION=$(git show "$TAG:spec/doc.json" 2>/dev/null | jq -r '.info.version // empty')

            if [ -z "$TAGGED_SPEC_VERSION" ]; then
              echo "repair=true" >> "$GITHUB_OUTPUT"
              echo "Existing tag $TAG is missing spec/doc.json version metadata; preparing repair."
            elif [ "$TAGGED_SPEC_VERSION" != "$EXPECTED" ]; then
              echo "repair=true" >> "$GITHUB_OUTPUT"
              echo "Existing tag $TAG has spec version $TAGGED_SPEC_VERSION, expected $EXPECTED; preparing repair."
            else
              echo "repair=false" >> "$GITHUB_OUTPUT"
              echo "Existing tag $TAG already matches expected spec version $EXPECTED."
            fi
          else
            echo "repair=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist; preparing initial tag creation."
          fi

      - name: Download latest spec
        if: steps.check.outputs.exists == 'false' && steps.state.outputs.repair == 'true'
        run: curl -sS https://api.nuon.co/docs/doc.json -o spec/doc.json

      - name: Ensure tag points at expected spec
        if: steps.check.outputs.exists == 'false' && steps.state.outputs.repair == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          EXPECTED="${{ steps.version.outputs.api_version }}"
          DOWNLOADED=$(jq -r '.info.version' spec/doc.json)

          if [ "$DOWNLOADED" != "$EXPECTED" ]; then
            echo "::error::Fetched spec/doc.json version $DOWNLOADED but expected API version $EXPECTED"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spec/doc.json
          git diff --cached --quiet || git commit -m "spec: update to ${TAG}"

          if [ "${{ steps.tag.outputs.exists }}" = 'true' ]; then
            git tag -fa "$TAG" -m "Release ${TAG}"
            git push --force origin "refs/tags/$TAG"
          else
            git tag -a "$TAG" -m "Release ${TAG}"
            git push origin "refs/tags/$TAG"
          fi

      - name: Checkout tag commit
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git checkout --detach "$TAG"

      - name: Validate tag/spec version alignment
        if: steps.check.outputs.exists == 'false'
        run: |
          EXPECTED="${{ steps.version.outputs.api_version }}"
          ACTUAL=$(jq -r '.info.version' spec/doc.json)

          echo "Expected API version: $EXPECTED"
          echo "Tagged spec version:  $ACTUAL"

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Tag/spec mismatch after tag reconciliation: expected $EXPECTED but spec/doc.json contains $ACTUAL"
            exit 1
          fi

      - name: Checkout tag commit
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git checkout --detach "$TAG"

      - name: Validate tag/spec version alignment
        if: steps.check.outputs.exists == 'false'
        run: |
          EXPECTED="${{ steps.version.outputs.api_version }}"
          ACTUAL=$(jq -r '.info.version' spec/doc.json)

          echo "Expected API version: $EXPECTED"
          echo "Tagged spec version:  $ACTUAL"

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Tag/spec mismatch: release tag expects $EXPECTED but spec/doc.json contains $ACTUAL"
            echo "::error::Manual remediation: delete/recreate the tag on the intended commit after updating spec/doc.json. See doc/releases.md"
            exit 1
          fi

      - name: Run GoReleaser
        if: steps.check.outputs.exists == 'false'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}
